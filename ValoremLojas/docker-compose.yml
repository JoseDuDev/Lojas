version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: valorem_lojas_db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-valorem_lojas}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: valorem_lojas_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}

  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: valorem_lojas_search
    restart: unless-stopped
    ports:
      - '7700:7700'
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-masterKey123}
      MEILI_ENV: development
    volumes:
      - meilisearch_data:/meili_data

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: valorem_lojas_api
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-valorem_lojas}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379
      MEILI_HOST: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-masterKey123}
      JWT_SECRET: ${JWT_SECRET:-changeme}
      NODE_ENV: development
    depends_on:
      - db
      - redis
      - meilisearch
    volumes:
      - ./apps/api:/app
      - /app/node_modules

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: valorem_lojas_web
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NODE_ENV: development
    depends_on:
      - api
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
  meilisearch_data:
